schemaVersion: 1
title: "Settings Panel"
when: "settingsOpen"
blocks:
  settingsPanelShell:
    title: "Settings Panel Shell"
    builder:
      category: "overlay"
      editable: true
    defaults:
      visible: true
      style:
        position: "fixed"
        background: "rgba(0,0,0,0.25)"
        zIndex: 3600
    layout:
      id: "blocks/settingsPanelShell/layout"
      use: "amux-primitive-box"
      builder:
        editable: true
layout:
  id: "settings-root"
  use: "settingsPanelShell"
  builder:
    editable: true
  children:
    - id: "settings-panel"
      type: "SettingsPanel"
      defaults:
        visible: true
      props:
        style:
          inset: 0
          padding: "20px"
          background: "rgba(0,0,0,0.25)"
      builder:
        editable: true
        resizable: false
