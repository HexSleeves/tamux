schemaVersion: 1
title: "Notification Panel"
when: "notificationPanelOpen"
blocks:
  notificationPanelShell:
    title: "Notification Panel Shell"
    builder:
      category: "overlay"
      editable: true
    defaults:
      visible: true
      style:
        position: "fixed"
        top: 72
        right: 12
        width: "min(420px, calc(100vw - 24px))"
        zIndex: 3200
    layout:
      id: "blocks/notificationPanelShell/layout"
      use: "amux-primitive-box"
      builder:
        editable: true
layout:
  id: "notification-root"
  use: "notificationPanelShell"
  builder:
    editable: true
  children:
    - id: "notification-panel"
      type: "NotificationPanel"
      props:
        visible: true
        resizable: true
        resizeAxis: "both"
        minWidth: 320
        minHeight: 220
        maxWidth: "92vw"
        maxHeight: "calc(100vh - 96px)"
      builder:
        editable: true
