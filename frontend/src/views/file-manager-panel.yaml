schemaVersion: 1
title: "File Manager"
when: "fileManagerOpen"
blocks:
  fileManagerShell:
    title: "File Manager Shell"
    builder:
      category: "panel"
      editable: true
    defaults:
      visible: true
      style:
        position: "fixed"
        inset: "0"
        background: "rgba(0,0,0,0.8)"
        padding: "20px"
        zIndex: 3200
      wrapperStyle:
        width: "100%"
        height: "100%"
        position: "absolute"
        background: "rgba(0,0,0,0.8)"
        inset: 0
    layout:
      id: "blocks/fileManagerShell/layout"
      use: "amux-primitive-box"
      builder:
        editable: true
layout:
  id: "file-manager-root"
  use: "fileManagerShell"
  builder:
    editable: true
  children:
    - id: "file-manager-panel"
      type: "FileManagerPanel"
      props:
        visible: true
        resizable: true
        position: "absolute"
        inset: 0
        wrapperStyle:
          width: "100%"
          height: "100%"
          position: "absolute"
          padding: 20
      builder:
        editable: true
