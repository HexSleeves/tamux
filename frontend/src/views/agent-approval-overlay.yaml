schemaVersion: 1
title: "Agent Approval Overlay"
when: "hasPendingApproval"
blocks:
  approvalOverlayShell:
    title: "Approval Overlay Shell"
    builder:
      category: "overlay"
      editable: true
    defaults:
      visible: true
    layout:
      id: "blocks/approvalOverlayShell/layout"
      use: "amux-primitive-box"
      builder:
        editable: true
layout:
  id: "agent-approval-root"
  use: "approvalOverlayShell"
  builder:
    editable: true
  children:
    - id: "agent-approval-overlay"
      type: "AgentApprovalOverlay"
      props:
        visible: true
      builder:
        editable: true
