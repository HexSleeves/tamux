schemaVersion: 1
title: "Execution Canvas"
when: "canvasOpen"
blocks:
  executionCanvasShell:
    title: "Execution Canvas Shell"
    builder:
      category: "overlay"
      editable: true
    defaults:
      visible: true
      style:
        position: "fixed"
        inset: 0
        zIndex: 3500
        background: "rgba(0,0,0,0.25)"
    layout:
      id: "blocks/executionCanvasShell/layout"
      use: "amux-primitive-box"
      builder:
        editable: true
layout:
  id: "execution-canvas-root"
  use: "executionCanvasShell"
  builder:
    editable: true
  children:
    - id: "execution-canvas-panel"
      type: "ExecutionCanvas"
      props:
        visible: true
      builder:
        editable: true
