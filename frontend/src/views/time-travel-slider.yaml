schemaVersion: 1
title: "Time Travel"
when: "timeTravelOpen"
blocks:
  timeTravelShell:
    title: "Time Travel Shell"
    builder:
      category: "overlay"
      editable: true
    defaults:
      visible: true
      style:
        position: "absolute"
        bottom: 12
        left: "50%"
        minWidth: 520
        maxWidth: 720
        zIndex: 200
    layout:
      id: "blocks/timeTravelShell/layout"
      use: "amux-primitive-box"
      builder:
        editable: true
layout:
  id: "time-travel-root"
  use: "timeTravelShell"
  builder:
    editable: true
  children:
    - id: "time-travel-slider"
      type: "TimeTravelSlider"
      props:
        visible: true
        resizable: true
        resizeAxis: "horizontal"
        minWidth: 420
        maxWidth: 900
      builder:
        editable: true
