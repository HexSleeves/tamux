schemaVersion: 1
title: "Command Palette"
when: "commandPaletteOpen"
blocks:
  commandPaletteShell:
    title: "Command Palette Shell"
    builder:
      category: "overlay"
      editable: true
    defaults:
      visible: true
    layout:
      id: "blocks/commandPaletteShell/layout"
      use: "amux-primitive-box"
      builder:
        editable: true
layout:
  id: "command-palette-root"
  use: "commandPaletteShell"
  builder:
    editable: true
  children:
    - id: "command-palette-panel"
      type: "CommandPalette"
      props:
        visible: true
      builder:
        editable: true
