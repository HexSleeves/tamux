schemaVersion: 1
title: "System Monitor"
when: "systemMonitorOpen"
blocks:
  systemMonitorShell:
    title: "System Monitor Shell"
    builder:
      category: "panel"
      editable: true
    defaults:
      visible: true
      style:
        position: "fixed"
        top: 88
        right: 12
        width: "min(560px, calc(100vw - 24px))"
        zIndex: 3300
    layout:
      id: "blocks/systemMonitorShell/layout"
      use: "amux-primitive-box"
      builder:
        editable: true
layout:
  id: "system-monitor-root"
  use: "systemMonitorShell"
  builder:
    editable: true
  children:
    - id: "system-monitor-panel"
      type: "SystemMonitorPanel"
      props:
        visible: true
        resizable: true
        resizeAxis: "both"
        minWidth: 420
        minHeight: 260
        maxWidth: "96vw"
        maxHeight: "calc(100vh - 108px)"
      builder:
        editable: true
