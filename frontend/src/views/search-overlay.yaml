schemaVersion: 1
title: "Search Overlay"
when: "searchOpen"
blocks:
  searchOverlayShell:
    title: "Search Overlay Shell"
    builder:
      category: "overlay"
      editable: true
    defaults:
      visible: true
      style:
        position: "absolute"
        top: 14
        right: 16
        zIndex: 100
        minWidth: 320
    layout:
      id: "blocks/searchOverlayShell/layout"
      use: "amux-primitive-box"
      builder:
        editable: true
layout:
  id: "search-overlay-root"
  use: "searchOverlayShell"
  builder:
    editable: true
  children:
    - id: "search-overlay-panel"
      type: "SearchOverlay"
      props:
        visible: true
      builder:
        editable: true
